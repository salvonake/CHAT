# LegalAI Infrastructure Stack
# Qdrant vector database for local operation

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: legalai-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (used by .NET client)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_data:
    driver: local
